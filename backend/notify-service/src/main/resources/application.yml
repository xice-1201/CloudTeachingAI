spring:
  application:
    name: notify-service
  datasource:
    url: jdbc:postgresql://localhost:5434/notify_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:notify-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8006

jwt:
  public-key-file: /app/keys/public_key.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
