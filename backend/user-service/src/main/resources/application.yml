spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8002

management:
  endpoints:
    web:
      exposure:
        include: health,info

auth-service:
  url: ${AUTH_SERVICE_URL:http://localhost:8001}
course-service:
  url: ${COURSE_SERVICE_URL:http://localhost:8003}
learn-service:
  url: ${LEARN_SERVICE_URL:http://localhost:8004}
assign-service:
  url: ${ASSIGN_SERVICE_URL:http://localhost:8005}
notify-service:
  url: ${NOTIFY_SERVICE_URL:http://localhost:8006}
chat-agent:
  url: ${CHAT_AGENT_URL:http://localhost:8104}

app:
  storage-root: ${APP_STORAGE_ROOT:/app/storage}

system-health:
  timeout-seconds: ${SYSTEM_HEALTH_TIMEOUT_SECONDS:5}
  targets:
    - key: auth-service
      name: 认证服务
      url: ${SYSTEM_HEALTH_AUTH_URL:http://localhost:8001/actuator/health}
    - key: user-service
      name: 用户服务
      url: ${SYSTEM_HEALTH_USER_URL:http://localhost:8002/actuator/health}
    - key: course-service
      name: 课程服务
      url: ${SYSTEM_HEALTH_COURSE_URL:http://localhost:8003/actuator/health}
    - key: learn-service
      name: 学习服务
      url: ${SYSTEM_HEALTH_LEARN_URL:http://localhost:8004/actuator/health}
    - key: assign-service
      name: 作业服务
      url: ${SYSTEM_HEALTH_ASSIGN_URL:http://localhost:8005/actuator/health}
    - key: notify-service
      name: 通知服务
      url: ${SYSTEM_HEALTH_NOTIFY_URL:http://localhost:8006/actuator/health}
    - key: tag-agent
      name: AI 标注服务
      url: ${SYSTEM_HEALTH_TAG_AGENT_URL:http://localhost:8101/health}
    - key: chat-agent
      name: AI 聊天服务
      url: ${SYSTEM_HEALTH_CHAT_AGENT_URL:http://localhost:8104/health}

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
