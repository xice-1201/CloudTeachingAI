spring:
  application:
    name: learn-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/learn_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8004

jwt:
  public-key-file: /app/keys/public_key.pem

course-service:
  url: ${COURSE_SERVICE_URL:http://localhost:8003}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
