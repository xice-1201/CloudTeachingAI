version: '3.8'

services:
  auth-db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  notify-db:
    image: postgres:16
    container_name: notify-db
    environment:
      POSTGRES_DB: notify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - notify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  course-db:
    image: postgres:16
    container_name: course-db
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - course-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  learn-db:
    image: postgres:16
    container_name: learn-db
    environment:
      POSTGRES_DB: learn_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - learn-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  assign-db:
    image: postgres:16
    container_name: assign-db
    environment:
      POSTGRES_DB: assign_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - assign-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  course-service:
    build:
      context: ./course-service
      dockerfile: Dockerfile
    container_name: course-service
    depends_on:
      course-db:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/course_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_STORAGE_ROOT: /app/storage
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY:-}
      AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL:-https://api.openai.com/v1}
      AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_MODEL: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
    volumes:
      - ../keys/public_key.pem:/app/keys/public_key.pem:ro
      - course-storage-data:/app/storage
    ports:
      - "8003:8003"

  learn-service:
    build:
      context: ./learn-service
      dockerfile: Dockerfile
    container_name: learn-service
    depends_on:
      learn-db:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://learn-db:5432/learn_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      COURSE_SERVICE_URL: http://course-service:8003
      USER_SERVICE_URL: http://user-service:8002
      AI_ABILITY_TEST_ENABLED: ${AI_ABILITY_TEST_ENABLED:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AI_ABILITY_TEST_TIMEOUT_SECONDS: ${AI_ABILITY_TEST_TIMEOUT_SECONDS:-45}
      AI_MENTOR_ADVICE_ENABLED: ${AI_MENTOR_ADVICE_ENABLED:-true}
      AI_MENTOR_ADVICE_TIMEOUT_SECONDS: ${AI_MENTOR_ADVICE_TIMEOUT_SECONDS:-45}
    volumes:
      - ../keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8004:8004"

  assign-service:
    build:
      context: ./assign-service
      dockerfile: Dockerfile
    container_name: assign-service
    depends_on:
      assign-db:
        condition: service_healthy
      course-service:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://assign-db:5432/assign_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      COURSE_SERVICE_URL: http://course-service:8003
    volumes:
      - ../keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8005:8005"

volumes:
  auth-db-data:
  user-db-data:
  notify-db-data:
  course-db-data:
  course-storage-data:
  learn-db-data:
  assign-db-data:
  redis-data:

