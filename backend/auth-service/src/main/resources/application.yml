spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  mail:
    host: smtp.qq.com
    port: 587
    username: 1500065926@qq.com
    password: uvtedubhebmeicdc
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8001

jwt:
  private-key-file: /app/keys/private_key.pem
  public-key-file: /app/keys/public_key.pem
  access-token-expiration: 7200
  refresh-token-expiration: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
