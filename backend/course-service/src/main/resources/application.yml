spring:
  application:
    name: course-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/course_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8003

jwt:
  public-key-file: /app/keys/public_key.pem

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8002}

notify-service:
  url: ${NOTIFY_SERVICE_URL:http://localhost:8005}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage-root: ${APP_STORAGE_ROOT:storage}
  outbox:
    poll-interval-ms: ${APP_OUTBOX_POLL_INTERVAL_MS:1000}
    batch-size: ${APP_OUTBOX_BATCH_SIZE:50}

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
