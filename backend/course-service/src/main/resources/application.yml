spring:
  application:
    name: course-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8003

jwt:
  public-key-file: /app/keys/public_key.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
