spring:
  application:
    name: course-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/course_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:course-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:256MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:256MB}

server:
  port: 8003

jwt:
  public-key-file: /app/keys/public_key.pem

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8002}

notify-service:
  url: ${NOTIFY_SERVICE_URL:http://localhost:8006}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage-root: ${APP_STORAGE_ROOT:storage}
  outbox:
    enabled: ${APP_OUTBOX_ENABLED:false}
    poll-interval-ms: ${APP_OUTBOX_POLL_INTERVAL_MS:1000}
    batch-size: ${APP_OUTBOX_BATCH_SIZE:50}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:false}

ai:
  tag-agent:
    enabled: ${AI_TAG_AGENT_ENABLED:true}
    base-url: ${AI_TAG_AGENT_BASE_URL:http://localhost:8101}
    timeout-seconds: ${AI_TAG_AGENT_TIMEOUT_SECONDS:30}
  tag-preview:
    enabled: ${AI_TAG_PREVIEW_ENABLED:true}
    provider-enabled: ${AI_TAG_PREVIEW_PROVIDER_ENABLED:true}
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    fallback-api-key: ${AI_TAG_PREVIEW_CHAT_API_KEY:${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY:${OPENAI_API_KEY:}}}
    fallback-base-url: ${AI_TAG_PREVIEW_CHAT_BASE_URL:${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}}
    fallback-model: ${AI_TAG_PREVIEW_CHAT_MODEL:gpt-4.1-mini}
    max-content-chars: ${AI_TAG_PREVIEW_MAX_CONTENT_CHARS:12000}
    max-download-bytes: ${AI_TAG_PREVIEW_MAX_DOWNLOAD_BYTES:8388608}
    video-transcription:
      enabled: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_ENABLED:true}
      provider-enabled: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_PROVIDER_ENABLED:true}
      api-key: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com/v1}}
      model: ${AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
      clip-duration-seconds: ${AI_TAG_PREVIEW_VIDEO_CLIP_DURATION_SECONDS:18}
      max-clips: ${AI_TAG_PREVIEW_VIDEO_MAX_CLIPS:3}
      max-transcript-chars: ${AI_TAG_PREVIEW_VIDEO_MAX_TRANSCRIPT_CHARS:4000}

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
