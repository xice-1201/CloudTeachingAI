spring:
  application:
    name: course-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/course_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 8003

jwt:
  public-key-file: /app/keys/public_key.pem

user-service:
  url: ${USER_SERVICE_URL:http://localhost:8002}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage-root: ${APP_STORAGE_ROOT:/app/storage}

logging:
  level:
    com.cloudteachingai: DEBUG
    org.springframework.web: INFO
