name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Select services to deploy'
        required: true
        default: all
        type: choice
        options:
          - all
          - auth-service
          - user-service
          - notify-service
          - course-service
          - learn-service
          - assign-service
          - tag-agent
          - chat-agent
          - frontend

env:
  DEPLOY_PATH: /opt/cloudteachingai
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth_changed: ${{ steps.flags.outputs.auth_changed }}
      user_changed: ${{ steps.flags.outputs.user_changed }}
      notify_changed: ${{ steps.flags.outputs.notify_changed }}
      course_changed: ${{ steps.flags.outputs.course_changed }}
      learn_changed: ${{ steps.flags.outputs.learn_changed }}
      assign_changed: ${{ steps.flags.outputs.assign_changed }}
      tag_changed: ${{ steps.flags.outputs.tag_changed }}
      chat_changed: ${{ steps.flags.outputs.chat_changed }}
      frontend_changed: ${{ steps.flags.outputs.frontend_changed }}
      image_changed: ${{ steps.flags.outputs.image_changed }}
      deploy_all: ${{ steps.flags.outputs.deploy_all }}
      should_deploy: ${{ steps.flags.outputs.should_deploy }}
      services: ${{ steps.flags.outputs.services }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'backend/auth-service/**'
            user:
              - 'backend/user-service/**'
            notify:
              - 'backend/notify-service/**'
            course:
              - 'backend/course-service/**'
            learn:
              - 'backend/learn-service/**'
            assign:
              - 'backend/assign-service/**'
            tag:
              - 'backend/tag-agent/**'
            chat:
              - 'backend/chat-agent/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'
              - 'deploy/**'

      - name: Prepare deploy flags
        id: flags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy_target="${{ github.event.inputs.deploy_target }}"

            auth_changed=false
            user_changed=false
            notify_changed=false
            course_changed=false
            learn_changed=false
            assign_changed=false
            tag_changed=false
            chat_changed=false
            frontend_changed=false
            image_changed=false
            deploy_all=false
            should_deploy=true

            if [ "$deploy_target" = "all" ]; then
              auth_changed=true
              user_changed=true
              notify_changed=true
              course_changed=true
              learn_changed=true
              assign_changed=true
              tag_changed=true
              chat_changed=true
              frontend_changed=true
              image_changed=true
              deploy_all=true
              services="auth-service user-service notify-service course-service learn-service assign-service tag-agent chat-agent frontend"
            else
              case "$deploy_target" in
                auth-service)
                  auth_changed=true
                  image_changed=true
                  services="auth-service frontend"
                  ;;
                user-service)
                  user_changed=true
                  image_changed=true
                  services="user-service frontend"
                  ;;
                notify-service)
                  notify_changed=true
                  image_changed=true
                  services="notify-service frontend"
                  ;;
                course-service)
                  course_changed=true
                  image_changed=true
                  services="course-service frontend"
                  ;;
                learn-service)
                  learn_changed=true
                  image_changed=true
                  services="learn-service frontend"
                  ;;
                assign-service)
                  assign_changed=true
                  image_changed=true
                  services="assign-service frontend"
                  ;;
                tag-agent)
                  tag_changed=true
                  image_changed=true
                  services="tag-agent course-service frontend"
                  ;;
                chat-agent)
                  chat_changed=true
                  image_changed=true
                  services="chat-agent frontend"
                  ;;
                frontend)
                  frontend_changed=true
                  image_changed=true
                  services="frontend"
                  ;;
                *)
                  echo "Unsupported deploy target: $deploy_target"
                  exit 1
                  ;;
              esac
            fi
          else
            auth_changed="${{ steps.changes.outputs.auth }}"
            user_changed="${{ steps.changes.outputs.user }}"
            notify_changed="${{ steps.changes.outputs.notify }}"
            course_changed="${{ steps.changes.outputs.course }}"
            learn_changed="${{ steps.changes.outputs.learn }}"
            assign_changed="${{ steps.changes.outputs.assign }}"
            tag_changed="${{ steps.changes.outputs.tag }}"
            chat_changed="${{ steps.changes.outputs.chat }}"
            frontend_changed="${{ steps.changes.outputs.frontend }}"
            infra_changed="${{ steps.changes.outputs.infra }}"

            image_changed=false
            should_deploy=false
            deploy_all=false
            services=""

            for service_flag in "$auth_changed" "$user_changed" "$notify_changed" "$course_changed" "$learn_changed" "$assign_changed" "$tag_changed" "$chat_changed" "$frontend_changed"; do
              if [ "$service_flag" = "true" ]; then
                image_changed=true
                should_deploy=true
              fi
            done

            if [ "$infra_changed" = "true" ]; then
              deploy_all=true
              should_deploy=true
              services="auth-service user-service notify-service course-service learn-service assign-service tag-agent chat-agent frontend"
            else
              if [ "$auth_changed" = "true" ]; then
                services="$services auth-service"
              fi
              if [ "$user_changed" = "true" ]; then
                services="$services user-service"
              fi
              if [ "$notify_changed" = "true" ]; then
                services="$services notify-service"
              fi
              if [ "$course_changed" = "true" ]; then
                services="$services course-service"
              fi
              if [ "$learn_changed" = "true" ]; then
                services="$services learn-service"
              fi
              if [ "$assign_changed" = "true" ]; then
                services="$services assign-service"
              fi
              if [ "$tag_changed" = "true" ]; then
                services="$services tag-agent course-service"
              fi
              if [ "$chat_changed" = "true" ]; then
                services="$services chat-agent"
              fi
              if [ "$auth_changed" = "true" ] || [ "$user_changed" = "true" ] || [ "$notify_changed" = "true" ] || [ "$course_changed" = "true" ] || [ "$learn_changed" = "true" ] || [ "$assign_changed" = "true" ] || [ "$tag_changed" = "true" ] || [ "$chat_changed" = "true" ]; then
                services="$services frontend"
              fi
              if [ "$frontend_changed" = "true" ]; then
                services="$services frontend"
              fi
            fi

            services="$(printf '%s\n' $services | awk '!seen[$0]++' | xargs)"
          fi

          echo "auth_changed=$auth_changed" >> "$GITHUB_OUTPUT"
          echo "user_changed=$user_changed" >> "$GITHUB_OUTPUT"
          echo "notify_changed=$notify_changed" >> "$GITHUB_OUTPUT"
          echo "course_changed=$course_changed" >> "$GITHUB_OUTPUT"
          echo "learn_changed=$learn_changed" >> "$GITHUB_OUTPUT"
          echo "assign_changed=$assign_changed" >> "$GITHUB_OUTPUT"
          echo "tag_changed=$tag_changed" >> "$GITHUB_OUTPUT"
          echo "chat_changed=$chat_changed" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend_changed" >> "$GITHUB_OUTPUT"
          echo "image_changed=$image_changed" >> "$GITHUB_OUTPUT"
          echo "deploy_all=$deploy_all" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "services=$services" >> "$GITHUB_OUTPUT"

          echo "=== Change Summary ==="
          echo "auth_changed=$auth_changed"
          echo "user_changed=$user_changed"
          echo "notify_changed=$notify_changed"
          echo "course_changed=$course_changed"
          echo "learn_changed=$learn_changed"
          echo "assign_changed=$assign_changed"
          echo "tag_changed=$tag_changed"
          echo "chat_changed=$chat_changed"
          echo "frontend_changed=$frontend_changed"
          echo "image_changed=$image_changed"
          echo "deploy_all=$deploy_all"
          echo "should_deploy=$should_deploy"
          echo "services=$services"

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: needs.detect-changes.outputs.image_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        if: needs.detect-changes.outputs.image_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push auth-service
        if: needs.detect-changes.outputs.auth_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          dockerfile: ./backend/auth-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:latest

      - name: Build and push user-service
        if: needs.detect-changes.outputs.user_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          dockerfile: ./backend/user-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:latest

      - name: Build and push notify-service
        if: needs.detect-changes.outputs.notify_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notify-service
          dockerfile: ./backend/notify-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/notify-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/notify-service:latest

      - name: Build and push course-service
        if: needs.detect-changes.outputs.course_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/course-service
          dockerfile: ./backend/course-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/course-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/course-service:latest

      - name: Build and push learn-service
        if: needs.detect-changes.outputs.learn_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/learn-service
          dockerfile: ./backend/learn-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/learn-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/learn-service:latest

      - name: Build and push assign-service
        if: needs.detect-changes.outputs.assign_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/assign-service
          dockerfile: ./backend/assign-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/assign-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/assign-service:latest

      - name: Build and push tag-agent
        if: needs.detect-changes.outputs.tag_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/tag-agent
          dockerfile: ./backend/tag-agent/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/tag-agent:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/tag-agent:latest

      - name: Build and push chat-agent
        if: needs.detect-changes.outputs.chat_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend/chat-agent
          dockerfile: ./backend/chat-agent/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/chat-agent:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/chat-agent:latest

      - name: Build and push frontend
        if: needs.detect-changes.outputs.frontend_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs:
      - detect-changes
      - build-and-push
    if: needs.detect-changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false
          script: |
            set +e
            set -u

            AUTH_CHANGED="${{ needs.detect-changes.outputs.auth_changed }}"
            USER_CHANGED="${{ needs.detect-changes.outputs.user_changed }}"
            NOTIFY_CHANGED="${{ needs.detect-changes.outputs.notify_changed }}"
            COURSE_CHANGED="${{ needs.detect-changes.outputs.course_changed }}"
            LEARN_CHANGED="${{ needs.detect-changes.outputs.learn_changed }}"
            ASSIGN_CHANGED="${{ needs.detect-changes.outputs.assign_changed }}"
            TAG_CHANGED="${{ needs.detect-changes.outputs.tag_changed }}"
            CHAT_CHANGED="${{ needs.detect-changes.outputs.chat_changed }}"
            FRONTEND_CHANGED="${{ needs.detect-changes.outputs.frontend_changed }}"
            DEPLOY_ALL="${{ needs.detect-changes.outputs.deploy_all }}"
            SERVICES="${{ needs.detect-changes.outputs.services }}"
            DEPLOY_SHA="${{ github.sha }}"

            echo "=== Deploying CloudTeachingAI ==="
            echo "Time: $(date)"
            echo "Deploy all: $DEPLOY_ALL"
            echo "Target services: $SERVICES"

            cd ${{ env.DEPLOY_PATH }}
            if [ $? -ne 0 ]; then
              echo "Failed to enter deploy path: ${{ env.DEPLOY_PATH }}"
              exit 1
            fi

            git pull origin main
            git_status=$?
            if [ "$git_status" -ne 0 ]; then
              echo "git pull failed, trying fetch + reset"
              git fetch origin main
              git_fetch_status=$?
              if [ "$git_fetch_status" -ne 0 ]; then
                echo "git fetch failed with exit code $git_fetch_status"
                exit "$git_fetch_status"
              fi
              git reset --hard origin/main
              git_reset_status=$?
              if [ "$git_reset_status" -ne 0 ]; then
                echo "git reset failed with exit code $git_reset_status"
                exit "$git_reset_status"
              fi
            fi

            docker login -u '${{ secrets.ALIYUN_USERNAME }}' -p '${{ secrets.ALIYUN_PASSWORD }}' '${{ secrets.ALIYUN_REGISTRY }}'
            docker_login_status=$?
            if [ "$docker_login_status" -ne 0 ]; then
              echo "docker login failed with exit code $docker_login_status"
              exit "$docker_login_status"
            fi

            cat > .env << EOF
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ALIYUN_REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
            ALIYUN_NAMESPACE=${{ secrets.ALIYUN_NAMESPACE }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}
            DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
            AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY=${{ secrets.AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_API_KEY }}
            AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL=${{ secrets.AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_BASE_URL }}
            AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_MODEL=${{ secrets.AI_TAG_PREVIEW_VIDEO_TRANSCRIPTION_MODEL }}
            EOF

            mkdir -p keys
            echo '${{ secrets.JWT_PRIVATE_KEY_BASE64 }}' | base64 -d > keys/private_key.pem
            echo '${{ secrets.JWT_PUBLIC_KEY_BASE64 }}' | base64 -d > keys/public_key.pem
            chmod 644 keys/*.pem

            pull_image_if_needed() {
              local flag="$1"
              local image_repo="$2"
              if [ "$flag" = "true" ]; then
                local sha_image="${image_repo}:${DEPLOY_SHA}"
                local latest_image="${image_repo}:latest"

                echo "Pulling $sha_image"
                docker pull "$sha_image"
                pull_status=$?
                if [ "$pull_status" -ne 0 ]; then
                  echo "docker pull failed for $sha_image with exit code $pull_status"
                  exit "$pull_status"
                fi

                echo "Tagging $sha_image as $latest_image"
                docker tag "$sha_image" "$latest_image"
                tag_status=$?
                if [ "$tag_status" -ne 0 ]; then
                  echo "docker tag failed for $sha_image with exit code $tag_status"
                  exit "$tag_status"
                fi

                echo "Resolved image digest:"
                docker image inspect "$sha_image" --format='{{index .RepoDigests 0}}' || true
              else
                echo "Skipping SHA pull for $image_repo, keep current latest image"
              fi
              return 0
            }

            wait_for_service() {
              local name="$1"
              local url="$2"
              local retries="$3"

              for i in $(seq 1 "$retries"); do
                if curl -sf "$url" > /dev/null 2>&1; then
                  echo "$name is healthy"
                  return 0
                fi
                echo "Waiting for $name... ($i/$retries)"
                sleep 15
              done

              echo "$name failed health check"
              docker compose logs --tail=200 "$name" || true
              return 1
            }

            wait_for_aggregate_system_health() {
              local retries="$1"
              local url="http://localhost:8002/api/v1/admin/system-health"
              local response_file
              response_file=$(mktemp)

              for i in $(seq 1 "$retries"); do
                if curl -sf "$url" -o "$response_file"; then
                  echo "Aggregated system health response received"
                  if command -v python3 > /dev/null 2>&1; then
                    python3 -c 'import json,sys; payload=json.load(open(sys.argv[1], encoding="utf-8")); items=payload.get("data") or []; valid=isinstance(items, list); print("Invalid system health payload: data is not a list") if not valid else None; sys.exit(1) if not valid else None; [print("- {} ({}): {}, http={}, latency={}ms, message={}".format(item.get("name") or item.get("key") or "unknown", item.get("key") or item.get("name") or "unknown", item.get("status") or "UNKNOWN", item.get("httpStatus") or "-", item.get("responseTimeMs") or "-", item.get("message") or "healthy")) for item in items]; failed=[item for item in items if item.get("status") != "UP"]; print("") if failed else None; print("Unhealthy services:") if failed else None; [print("  * {}: {}".format(item.get("name") or item.get("key") or "unknown", item.get("message") or "DOWN")) for item in failed]; sys.exit(1 if failed else 0)' "$response_file"
                    parse_status=$?
                  else
                    echo "python3 not found on server, using raw health payload fallback"
                    cat "$response_file"
                    if grep -q '"status"[[:space:]]*:[[:space:]]*"DOWN"' "$response_file"; then
                      parse_status=1
                    else
                      parse_status=0
                    fi
                  fi

                  rm -f "$response_file"
                  if [ "$parse_status" -eq 0 ]; then
                    echo "Aggregated system health check passed"
                    return 0
                  fi
                  echo "Aggregated system health check found unhealthy services"
                  return 1
                fi
                echo "Waiting for aggregated system health endpoint... ($i/$retries)"
                sleep 15
              done

              rm -f "$response_file"
              echo "Aggregated system health endpoint is unavailable"
              return 2
            }

            pull_image_if_needed "$AUTH_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/auth-service"
            pull_image_if_needed "$USER_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/user-service"
            pull_image_if_needed "$NOTIFY_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/notify-service"
            pull_image_if_needed "$COURSE_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/course-service"
            pull_image_if_needed "$LEARN_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/learn-service"
            pull_image_if_needed "$ASSIGN_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/assign-service"
            pull_image_if_needed "$TAG_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/tag-agent"
            pull_image_if_needed "$CHAT_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/chat-agent"
            pull_image_if_needed "$FRONTEND_CHANGED" "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/frontend"
            echo "Finished image pull phase"
            echo "Selecting compose update strategy..."

            case "$DEPLOY_ALL" in
              true)
                echo "Applying full compose update..."
                compose_log=$(mktemp)
                docker compose up -d --force-recreate --remove-orphans >"$compose_log" 2>&1
                compose_status=$?
                cat "$compose_log"
                rm -f "$compose_log"
                if [ "$compose_status" -ne 0 ]; then
                  echo "docker compose up failed with exit code $compose_status"
                  docker compose ps || true
                  for service in $SERVICES; do
                    docker compose logs --tail=200 "$service" || true
                  done
                  exit "$compose_status"
                fi
                ;;
              false)
                echo "Applying incremental update..."
                echo "Updating services: $SERVICES"
                compose_log=$(mktemp)
                docker compose up -d --force-recreate $SERVICES >"$compose_log" 2>&1
                compose_status=$?
                cat "$compose_log"
                rm -f "$compose_log"
                if [ "$compose_status" -ne 0 ]; then
                  echo "docker compose up failed with exit code $compose_status"
                  docker compose ps || true
                  for service in $SERVICES; do
                    docker compose logs --tail=200 "$service" || true
                  done
                  exit "$compose_status"
                fi
                ;;
              *)
                echo "Unexpected DEPLOY_ALL value: $DEPLOY_ALL"
                exit 1
                ;;
            esac
            echo "Compose update phase completed"

            echo "=== Service Status ==="
            docker compose ps

            echo "=== Health Checks ==="
            aggregate_status=0
            wait_for_aggregate_system_health 6 || aggregate_status=$?
            if [ "$aggregate_status" -eq 1 ]; then
              echo "Aggregated system health check failed"
              docker compose ps || true
              exit 1
            fi

            if [ "$aggregate_status" -eq 2 ]; then
              echo "Falling back to targeted service health checks"
              if [ "$DEPLOY_ALL" = "true" ] || [ "$AUTH_CHANGED" = "true" ]; then
                wait_for_service auth-service http://localhost:8001/actuator/health 3
              fi
              if [ "$DEPLOY_ALL" = "true" ] || [ "$USER_CHANGED" = "true" ]; then
                wait_for_service user-service http://localhost:8002/actuator/health 3
              fi
              if [ "$DEPLOY_ALL" = "true" ] || [ "$NOTIFY_CHANGED" = "true" ]; then
                wait_for_service notify-service http://localhost:8006/actuator/health 3
              fi
              if [ "$DEPLOY_ALL" = "true" ] || [ "$COURSE_CHANGED" = "true" ]; then
                wait_for_service course-service http://localhost:8003/actuator/health 3
              fi
              if [ "$DEPLOY_ALL" = "true" ] || [ "$LEARN_CHANGED" = "true" ]; then
                wait_for_service learn-service http://localhost:8004/actuator/health 3
              fi
              if [ "$DEPLOY_ALL" = "true" ] || [ "$ASSIGN_CHANGED" = "true" ]; then
                wait_for_service assign-service http://localhost:8005/actuator/health 3
              fi
