name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/cloudteachingai
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and push base images
        run: |
          docker pull postgres:16-alpine
          docker tag postgres:16-alpine ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/postgres:16-alpine
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/postgres:16-alpine

          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/redis:7-alpine
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/redis:7-alpine

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          dockerfile: ./backend/auth-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:latest

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          dockerfile: ./backend/user-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:latest

      - name: Build and push notify-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notify-service
          dockerfile: ./backend/notify-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/notify-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/notify-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "=== Deploying CloudTeachingAI ==="
            echo "Time: $(date)"

            cd ${{ env.DEPLOY_PATH }}

            git pull origin main || git fetch origin main && git reset --hard origin/main

            docker login -u '${{ secrets.ALIYUN_USERNAME }}' -p '${{ secrets.ALIYUN_PASSWORD }}' '${{ secrets.ALIYUN_REGISTRY }}'

            echo "Pulling images..."
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/postgres:16-alpine
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/redis:7-alpine
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/auth-service:latest
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/user-service:latest
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/notify-service:latest
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/frontend:latest

            cat > .env << EOF
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ALIYUN_REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
            ALIYUN_NAMESPACE=${{ secrets.ALIYUN_NAMESPACE }}
            EOF

            mkdir -p keys
            echo '${{ secrets.JWT_PRIVATE_KEY_BASE64 }}' | base64 -d > keys/private_key.pem
            echo '${{ secrets.JWT_PUBLIC_KEY_BASE64 }}' | base64 -d > keys/public_key.pem
            chmod 644 keys/*.pem

            echo "Stopping old containers..."
            docker compose down --remove-orphans || true

            echo "Starting services..."
            docker compose up -d

            echo "Waiting for services..."
            sleep 60

            echo "=== Service Status ==="
            docker compose ps

            echo "=== Health Checks ==="
            wait_for_service() {
              local name="$1"
              local url="$2"
              local retries="$3"

              for i in $(seq 1 "$retries"); do
                if curl -sf "$url" > /dev/null 2>&1; then
                  echo "$name is healthy"
                  return 0
                fi
                echo "Waiting for $name... ($i/$retries)"
                sleep 15
              done

              echo "$name failed health check"
              docker compose logs --tail=200 "$name" || true
              return 1
            }

            wait_for_service auth-service http://localhost:8001/actuator/health 3
            wait_for_service user-service http://localhost:8002/actuator/health 3
            wait_for_service notify-service http://localhost:8006/actuator/health 3

            if curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "frontend is healthy"
            else
              echo "frontend may not be fully ready yet"
              docker compose logs --tail=200 frontend || true
              exit 1
            fi

            echo "Cleaning old images..."
            docker image prune -af --filter "until=24h" || true

            echo ""
            echo "=== Deployment Finished ==="
            echo "frontend: http://${{ secrets.SERVER_HOST }}"
            echo "auth-service: http://${{ secrets.SERVER_HOST }}:8001"
            echo "user-service: http://${{ secrets.SERVER_HOST }}:8002"
            echo "notify-service: http://${{ secrets.SERVER_HOST }}:8006"
