name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/cloudteachingai
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Pull and push base images
        run: |
          # Pull and push postgres
          docker pull postgres:16-alpine
          docker tag postgres:16-alpine ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/postgres:16-alpine
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/postgres:16-alpine

          # Pull and push redis
          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/redis:7-alpine
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/redis:7-alpine

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          dockerfile: ./backend/auth-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/auth-service:latest

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          dockerfile: ./backend/user-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/user-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            echo "=== 开始部署 CloudTeachingAI ==="
            echo "时间: $(date)"

            cd ${{ env.DEPLOY_PATH }}

            # 拉取最新代码
            git pull origin main || git fetch origin main && git reset --hard origin/main

            # 登录阿里云镜像仓库
            podman login -u '${{ secrets.ALIYUN_USERNAME }}' -p '${{ secrets.ALIYUN_PASSWORD }}' '${{ secrets.ALIYUN_REGISTRY }}'

            # 拉取所有镜像
            echo "拉取镜像..."
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/postgres:16-alpine
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/redis:7-alpine
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/auth-service:latest
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/user-service:latest
            podman pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/frontend:latest

            # 创建 .env 文件
            cat > .env << EOF
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_PRIVATE_KEY="${{ secrets.JWT_PRIVATE_KEY }}"
            JWT_PUBLIC_KEY="${{ secrets.JWT_PUBLIC_KEY }}"
            ALIYUN_REGISTRY=${{ secrets.ALIYUN_REGISTRY }}
            ALIYUN_NAMESPACE=${{ secrets.ALIYUN_NAMESPACE }}
            EOF

            # 停止旧容器
            echo "停止旧容器..."
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true

            # 启动服务
            echo "启动服务..."
            docker-compose -f docker-compose.prod.yml up -d

            # 等待服务启动
            echo "等待服务启动..."
            sleep 30

            # 检查服务状态
            echo "=== 服务状态 ==="
            docker-compose -f docker-compose.prod.yml ps

            # 健康检查
            echo "=== 健康检查 ==="

            if curl -sf http://localhost:8001/actuator/health > /dev/null 2>&1; then
              echo "✓ auth-service 运行正常"
            else
              echo "⚠ auth-service 可能未完全启动"
              docker-compose -f docker-compose.prod.yml logs --tail=20 auth-service
            fi

            if curl -sf http://localhost:8002/actuator/health > /dev/null 2>&1; then
              echo "✓ user-service 运行正常"
            else
              echo "⚠ user-service 可能未完全启动"
              docker-compose -f docker-compose.prod.yml logs --tail=20 user-service
            fi

            if curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "✓ frontend 运行正常"
            else
              echo "⚠ frontend 可能未完全启动"
              docker-compose -f docker-compose.prod.yml logs --tail=20 frontend
            fi

            # 清理旧镜像
            echo "清理旧镜像..."
            podman image prune -af --filter "until=24h" || true

            echo ""
            echo "=== 部署完成 ==="
            echo "前端地址: http://${{ secrets.SERVER_HOST }}"
            echo "auth-service: http://${{ secrets.SERVER_HOST }}:8001"
            echo "user-service: http://${{ secrets.SERVER_HOST }}:8002"