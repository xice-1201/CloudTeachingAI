services:
  auth-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  user-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: user-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: user_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  notify-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: notify-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: notify_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - notify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  course-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: course-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: course_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - course-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  learn-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: learn-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: learn_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - learn-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  assign-db:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:16-alpine
    container_name: assign-db
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: assign_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - assign-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  auth-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      USER_SERVICE_URL: http://user-service:8002
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-1500065926@qq.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-uvtedubhebmeicdc}
    volumes:
      - ./keys/private_key.pem:/app/keys/private_key.pem:ro
      - ./keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8001:8001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  user-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/user-service:latest
    container_name: user-service
    restart: unless-stopped
    depends_on:
      user-db:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      AUTH_SERVICE_URL: http://auth-service:8001
      NOTIFY_SERVICE_URL: http://notify-service:8006
    ports:
      - "8002:8002"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notify-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/notify-service:latest
    container_name: notify-service
    restart: unless-stopped
    depends_on:
      notify-db:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://notify-db:5432/notify_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8006:8006"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  course-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/course-service:latest
    container_name: course-service
    restart: unless-stopped
    depends_on:
      course-db:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/course_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      USER_SERVICE_URL: http://user-service:8002
    volumes:
      - ./keys/public_key.pem:/app/keys/public_key.pem:ro
      - course-storage-data:/app/storage
    ports:
      - "8003:8003"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  learn-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/learn-service:latest
    container_name: learn-service
    restart: unless-stopped
    depends_on:
      learn-db:
        condition: service_healthy
      course-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://learn-db:5432/learn_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      COURSE_SERVICE_URL: http://course-service:8003
    volumes:
      - ./keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8004:8004"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  assign-service:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/assign-service:latest
    container_name: assign-service
    restart: unless-stopped
    depends_on:
      assign-db:
        condition: service_healthy
      course-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:postgresql://assign-db:5432/assign_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      COURSE_SERVICE_URL: http://course-service:8003
    volumes:
      - ./keys/public_key.pem:/app/keys/public_key.pem:ro
    ports:
      - "8005:8005"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/frontend:latest
    container_name: frontend
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      notify-service:
        condition: service_healthy
      course-service:
        condition: service_healthy
      learn-service:
        condition: service_healthy
      assign-service:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  auth-db-data:
  user-db-data:
  notify-db-data:
  course-db-data:
  course-storage-data:
  learn-db-data:
  assign-db-data:
  redis-data:
